name: Matillion Artifact Pipeline

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  create-artifact:
    runs-on: ubuntu-latest

    steps:
      # Checkout full history 
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Print metadata 
      - name: Print Metadata
        run: |
          echo "==================================="
          echo "  Commit ID : ${{ github.event.pull_request.head.sha }}"
          echo "  User      : ${{ github.actor }}"
          echo "  Email     : $(git log -1 --pretty=format:'%ae' ${{ github.event.pull_request.head.sha }})"
          echo "  PR Number : ${{ github.event.pull_request.number }}"
          echo "==================================="

      # Detect changed orchestration & transformation files
    
      - name: Get Changed Pipeline Files
        run: |
          echo "=== Changed Pipeline Files in this PR ==="

          git diff --name-only \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} \
            | grep -E '\.(orch|tran)\.yaml$' > changed_pipelines.txt || true

          if [ -s changed_pipelines.txt ]; then
            echo "Changed files:"
            cat changed_pipelines.txt
          else
            echo "No orchestration or transformation files changed."
          fi
          echo "========================================="

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install dependencies 
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      # Create Artifact 
      - name: Create Matillion Artifact
        run: |
          python scripts/create_artifact.py \
            "${{ secrets.CLIENT_ID }}" \
            "${{ secrets.CLIENT_SECRET }}" \
            "${{ secrets.PROJECT_ID }}" \
            "dev" \
            "${{ github.event.pull_request.head.sha }}"