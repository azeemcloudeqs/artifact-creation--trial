name: Matillion Artifact Pipeline

on:
  pull_request:
    branches:
      - main
    paths:
      - 'matillion/**'

jobs:
  create-artifact:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout with full history so git log works
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Extract Metadata
      - name: Extract Metadata
        id: meta
        run: |
          echo "COMMIT_ID=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
          echo "USERNAME=${{ github.actor }}"                         >> $GITHUB_ENV
          echo "USER_EMAIL=$(git log -1 --pretty=format:'%ae' ${{ github.event.pull_request.head.sha }})" >> $GITHUB_ENV
          echo "PR_NUMBER=${{ github.event.pull_request.number }}"    >> $GITHUB_ENV

      # 3. Print Debug Info
      - name: Print Metadata
        run: |
          echo "==================================="
          echo "  Commit ID : $COMMIT_ID"
          echo "  User      : $USERNAME"
          echo "  Email     : $USER_EMAIL"
          echo "  PR Number : $PR_NUMBER"
          echo "==================================="

      # 4. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 5. Install Dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 6. Run Python Script
      - name: Create Matillion Artifact
        env:
          CLIENT_ID:               ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET:           ${{ secrets.CLIENT_SECRET }}
          PROJECT_ID:              ${{ secrets.PROJECT_ID }}
          COMMIT_ID:               ${{ env.COMMIT_ID }}
          USERNAME:                ${{ env.USERNAME }}
          USER_EMAIL:              ${{ env.USER_EMAIL }}
          PR_NUMBER:               ${{ env.PR_NUMBER }}
        run: python scripts/create_artifact.py